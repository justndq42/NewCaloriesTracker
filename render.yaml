services:
  - type: web
    name: new-calories-food-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PASSWORD_RESET_REDIRECT_URL
        value: narutocalories://password-reset
      - key: SPOONACULAR_API_KEY
        sync: false
